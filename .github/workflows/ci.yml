name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  c:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [clang, gcc]
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y clang
      - run: CC=${{ matrix.compiler }} make test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - working-directory: python
        run: pip install -e ".[dev]"
      - working-directory: python
        run: ruff check sensorsim tests
      - working-directory: python
        run: pytest

  smoke:
    runs-on: ubuntu-latest
    needs: [c]
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y clang
      - run: CC=clang make all
      - run: ./build/sensorsim sample --n 10 --dt 0.01 | tee /tmp/samp.jsonl
      - run: grep -q '"t":' /tmp/samp.jsonl

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t sensorsim:ci .
